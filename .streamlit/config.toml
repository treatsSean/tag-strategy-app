# Force a stable base theme so Streamlit's canvas-rendered widgets
# (data_editor grid, default text colors) never auto-follow the
# browser/OS dark-mode preference. Our custom CSS in app.py only
# swaps header/sidebar chrome color between the "Dark Header" and
# "Light" app-level toggle; the underlying Streamlit base stays
# light so default text is always dark-on-light and legible.
[theme]
base = "light"
primaryColor = "#FF3621"
backgroundColor = "#F9F9F9"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1B2431"
font = "sans serif"
